<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Discord RPC Bridge 설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 16px; color: #222; }

    .header { margin-bottom: 20px; }
    .header h1 { font-size: 1.15rem; margin: 0; }

    .field { margin-bottom: 14px; }
    label.lbl { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 5px; }
    input[type=text] {
      width: 100%; padding: 7px 10px;
      border: 1px solid #d0d0d0; border-radius: 6px;
      font-size: .88rem; background: #fafafa;
    }
    input[type=text]:focus { outline: 2px solid #5865f2; border-color: transparent; background: #fff; }
    .hint { font-size: .75rem; color: #888; margin-top: 4px; }

    /* ── 연결 오류 상태 ── */
    .ws-status {
      background: #fff8f8; border: 1px solid #f0c0c0; border-radius: 6px;
      padding: 10px 12px; margin-bottom: 14px;
    }
    .ws-row { display: flex; justify-content: space-between; align-items: baseline; margin: 3px 0; font-size: .8rem; }
    .ws-row .lbl { color: #888; font-weight: normal; }
    .ws-row .val { font-weight: 600; color: #222; max-width: 65%; text-align: right; word-break: break-all; }
    .ws-row .val.retry { color: #c0392b; }
    .btn-reconnect {
      display: block; width: 100%; margin-top: 10px;
      padding: 7px 0; border: none; border-radius: 6px;
      font-size: .82rem; font-weight: 600; cursor: pointer;
      background: #e8e8e8; color: #333;
    }
    .btn-reconnect:hover { background: #d8d8d8; }

    /* ── 저장 버튼 ── */
    .save-row { margin-top: 8px; }
    .btn-save {
      padding: 9px 28px; border: none; border-radius: 7px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      background: #5865f2; color: #fff;
    }
    .btn-save:hover { background: #4752c4; }

    /* ── 상태 메시지 ── */
    #status { margin-top: 12px; font-size: .82rem; min-height: 1.2em; }
    .ok  { color: #2d7d46; }
    .err { color: #c0392b; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Discord RPC Bridge 설정</h1>
  </div>

  <div class="field">
    <label class="lbl">arRPC 브릿지 URL</label>
    <input type="text" id="arpcUrl" placeholder="ws://127.0.0.1:1337">
    <div class="hint">Discord 탭이 열려 있는 동안 자동으로 연결됩니다.</div>
  </div>

  <div id="wsStatus" class="ws-status" style="display:none">
    <div class="ws-row"><span class="lbl">오류 횟수</span><span class="val" id="wsErrCount">0</span></div>
    <div class="ws-row"><span class="lbl">재시도까지</span><span class="val retry" id="wsRetryIn">—</span></div>
    <button class="btn-reconnect" id="btnReconnect">강제 재연결</button>
  </div>

  <div class="save-row">
    <button class="btn-save" id="btnSave">저장</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
